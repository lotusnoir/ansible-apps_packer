---
- name: Check if Packer is present with the right version
  ansible.builtin.command: "{{ packer_install_path }}/packer --version"
  register: _packer_installed_version
  ignore_errors: true
  changed_when: false
  failed_when: false

- name: Find all versions of Packer
  ansible.builtin.uri:
    url: https://releases.hashicorp.com/packer/index.json
    return_content: true
  register: packer_index
  when: packer_version == "latest"
  check_mode: false

- name: Finds the latest Packer version when latest var is define
  ansible.builtin.set_fact:
    __packer_version: "{{ (packer_index.content | from_json).versions | reject('search', '-') | list | sort_versions | last }}"
  when: packer_version == 'latest'

- name: Use the specified Packer version when latest var is not define
  ansible.builtin.set_fact:
    __packer_version: "{{ packer_version }}"
  when: packer_version != 'latest'

- name: "Install tasks"
  when: __packer_version not in ( _packer_installed_version.stdout_lines | default(['empty'], true) | first )
  block:
    - name: "Install requierements"
      ansible.builtin.package:
        name: ["unzip", "tar"]
        state: present
      register: __pkg_result
      retries: 12
      delay: 10
      until: __pkg_result is success

    - name: "Install Packer"
      ansible.builtin.unarchive:
        src: https://releases.hashicorp.com/packer/{{ __packer_version }}/packer_{{ __packer_version }}_linux_{{ packer_arch }}.zip
        dest: "{{ packer_install_path }}"
        creates: "{{ packer_install_path }}/packer"
        remote_src: true
        mode: '0755'
